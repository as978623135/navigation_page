<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>荣恒研发AI小站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        /* 默认亮色模式 */
        body {
            background-color: #f5f5f5;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 暗黑模式样式 */
        body.dark {
            background-color: #1a1a1a;
            color: #e0e0e0;
        }

        /* 顶部标题栏 */
        header {
            background-color: #eaeaea;
            padding: 12px 16px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        body.dark header {
            background-color: #2d2d2d;
            border-bottom-color: #444;
        }

        .header-title {
            font-size: 24px;
            font-weight: bold;
            color: red;
            text-decoration: none;
        }
        .header-title:hover {
            opacity: 0.8;
        }

        /* 功能按钮容器（暗黑模式+语音播报） */
        .function-btns {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .func-btn {
            padding: 6px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background-color: #fff;
            color: #333;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        body.dark .func-btn {
            background-color: #333;
            border-color: #555;
            color: #e0e0e0;
        }
        .func-btn:hover {
            background-color: #f0f0f0;
        }
        body.dark .func-btn:hover {
            background-color: #444;
        }
        .func-btn.active {
            background-color: #e8f0fe;
            border-color: #4285f4;
            color: #4285f4;
        }
        body.dark .func-btn.active {
            background-color: #2a4365;
            border-color: #6394f8;
            color: #6394f8;
        }

        .container {
            display: flex;
            flex: 1;
        }

        /* 左侧侧边栏 */
        aside {
            width: 200px;
            background-color: #fff;
            border-right: 1px solid #ddd;
            padding: 16px 0;
            /* 侧边栏内容过多时滚动 */
            overflow-y: auto;
            max-height: calc(100vh - 80px);
        }
        body.dark aside {
            background-color: #2d2d2d;
            border-right-color: #444;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            text-decoration: none;
            color: #333;
            font-size: 14px;
        }
        body.dark .nav-item {
            color: #e0e0e0;
        }
        .nav-item:hover {
            background-color: #f0f0f0;
        }
        body.dark .nav-item:hover {
            background-color: #444;
        }
        .nav-item img {
            width: 16px;
            height: 16px;
            filter: invert(0);
        }
        body.dark .nav-item img {
            filter: invert(1);
        }
        .nav-item.active {
            background-color: #e8f0fe;
            color: #4285f4;
        }
        body.dark .nav-item.active {
            background-color: #2a4365;
            color: #6394f8;
        }

        /* 主内容区 */
        main {
            flex: 1;
            padding: 32px;
            position: relative;
            background-color: #fff;
            /* 新增：主内容区最小高度，确保父容器有足够高度 */
            min-height: calc(100vh - 80px); /* 减去header和footer的高度 */
        }
        body.dark main {
            background-color: #2d2d2d;
        }

        /* 荣恒AI助手 LOGO 样式 */
        .ai-title {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 5;
            width: 180px;
            height: 40px;
        }
        .ai-title img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: invert(0);
        }
        body.dark .ai-title img {
            filter: invert(1);
        }

        /* 清空按钮 */
        #clearBtn {
            position: absolute;
            top: 5px;
            right: 0;
            padding: 4px 12px;
            background-color: #f5f5f4;
            border: 1px solid #ddd;
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
        }
        body.dark #clearBtn {
            background-color: #333;
            border-color: #555;
            color: #e0e0e0;
        }

        /* 对话区域 核心修复：固定高度+滚动 */
        .ai-chat-area {
            /* 固定可视高度，内容超过则滚动 */
            height: 500px; /* 核心：设置固定高度，可根据需求调整 */
            min-height: 1000px; /* 最小高度，防止过小 */
            margin: 40px auto 20px auto;
            padding: 10px;
            border-radius: 8px;
            background-color: #f9f9f9;
            overflow-y: auto; /* 内容超过高度时垂直滚动 */
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 900px;
            width: 90%;
            /* 新增：边框，方便识别容器范围 */
            border: 1px solid #eee;
        }
        body.dark .ai-chat-area {
            background-color: #333;
            border-color: #555;
        }

        /* 消息气泡容器（包含图标+内容） */
        .message-wrapper {
            display: flex;
            align-items: center;
            max-width: 75%;
            gap: 8px;
        }
        .user-message-wrapper {
            align-self: flex-end;
        }
        .ai-message-wrapper {
            align-self: flex-start;
        }
        /* 本地图标样式 */
        .message-icon {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 28px;
        }
        .message-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: invert(0);
        }
        body.dark .message-icon img {
            filter: invert(1);
        }
        /* 消息气泡 */
        .message-content {
            padding: 8px 12px;
            border-radius: 12px;
            line-height: 1.4;
            flex: 1;
            line-height: 28px;
            min-height: 28px;
            display: flex;
            align-items: center;
        }
        .user-message {
            background-color: #e8f0fe;
            color: #333;
        }
        body.dark .user-message {
            background-color: #2a4365;
            color: #e0e0e0;
        }
        .ai-message {
            background-color: #fff;
            border: 1px solid #eee;
            color: #333;
        }
        body.dark .ai-message {
            background-color: #444;
            border-color: #555;
            color: #e0e0e0;
        }
        .typing {
            color: #666;
            font-style: italic;
        }
        body.dark .typing {
            color: #bbb;
        }

        /* 输入框区域 */
        .ai-input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            width: 100%;
            margin: 0 auto;
            max-width: 900px;
            width: 90%;
        }
        .ai-input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            outline: none;
            font-size: 15px;
            background-color: #fff;
            color: #333;
        }
        body.dark .ai-input {
            background-color: #333;
            border-color: #555;
            color: #e0e0e0;
        }
        .ai-send-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: none;
            background-color: #fff;
            color: red;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e0e0e0;
        }
        body.dark .ai-send-btn {
            background-color: #333;
            border-color: #555;
            color: #ff6b6b;
        }
        .ai-send-btn:hover {
            background-color: #fff0f0;
        }
        body.dark .ai-send-btn:hover {
            background-color: #444;
        }

        /* 内嵌iframe */
        .search-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        /* 自定义面板（通用） */
        .custom-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 24px;
            color: #999;
        }
        body.dark .custom-panel {
            color: #ccc;
        }
        .custom-panel h2 {
            font-size: 24px;
            color: #999;
            font-weight: normal;
        }
        body.dark .custom-panel h2 {
            color: #ccc;
        }

        footer {
            background-color: #eaeaea;
            padding: 16px;
            border-top: 1px solid #ddd;
            text-align: center;
            font-size: 12px;
            color: #666;
        }
        body.dark footer {
            background-color: #2d2d2d;
            border-top-color: #444;
            color: #bbb;
        }
    </style>
</head>
<body>

<header>
    <a href="https://user.qzone.qq.com/3014935296/main" target="_blank" class="header-title">
        荣恒研发AI小站
    </a>
    <div class="function-btns">
        <button id="voiceBtn" class="func-btn">
            <span>🔊</span> 语音播报
        </button>
        <button id="darkModeBtn" class="func-btn">
            <span>🌙</span> 暗黑模式
        </button>
    </div>
</header>

<div class="container">
    <aside>
        <a href="#" class="nav-item active" data-type="home">🏠 首页</a>
        <!-- 原有AI平台导航 -->
        <a href="https://kimi.ai" class="nav-item" data-type="engine"><img src="ico/KIMI.png" alt="Kimi"> Kimi</a>
        <a href="https://www.doubao.com" class="nav-item" data-type="engine"><img src="ico/DouBao.png" alt="豆包"> 豆包</a>
        <a href="https://yiyan.baidu.com" class="nav-item" data-type="engine"><img src="ico/YiYan.png" alt="文心一言"> 文心一言</a>
        <a href="#" class="nav-item" data-page="jimeng"><img src="ico/JiMeng.png" alt="即梦平台"> 即梦平台</a>
        <a href="#" class="nav-item" data-page="qianwen"><img src="ico/QianWen.png" alt="通义千问"> 通义千问</a>
        <a href="#" class="nav-item" data-page="chatglm"><img src="ico/QingYan.png" alt="智谱清言"> 智谱清言</a>
        <!-- 新增的功能选项卡 -->
        <a href="#" class="nav-item" data-page="prompt-set">📝 提示词集</a>
        <a href="#" class="nav-item" data-page="course-script">📚 课程文稿</a>
        <a href="#" class="nav-item" data-page="video-script">🎬 视频脚本</a>
        <a href="#" class="nav-item" data-page="photo-correct">✍️ 拍题批改</a>
        <a href="#" class="nav-item" data-page="photo-answer">❓ 拍题答疑</a>
        <a href="#" class="nav-item" data-page="multi-translate">🌐 多语言翻译</a>
        <a href="#" class="nav-item" data-page="chinese-analyze">✏️ 汉字解析</a>

        <a href="#" class="nav-item" data-page="article-read">🔊 文章朗读</a>
    </aside>

    <main>
        <!-- 首页内容区 -->
        <div class="home-content" id="homeContent">
            <div class="ai-title">
                <img src="ico/Logo_RongHengJiaoYu.png" alt="荣恒教育AI助手">
            </div>
            <button id="clearBtn">清空对话</button>
            <div class="ai-chat-area" id="chatArea">
                <div class="ai-message-wrapper message-wrapper">
                    <div class="message-icon">
                        <img src="ico/LongXia.png" alt="AI图标">
                    </div>
                    <div class="message-content ai-message">你好！我是荣恒AI助手，有什么可以帮你的？</div>
                </div>
            </div>
            <div class="ai-input-group">
                <input type="text" id="userInput" class="ai-input" placeholder="请输入问题...">
                <button id="sendBtn" class="ai-send-btn"><i>✈️</i></button>
            </div>
        </div>

        <!-- 内嵌iframe（原有AI平台） -->
        <iframe id="searchFrame" class="search-frame"></iframe>
        
        <!-- 原有自定义面板 -->
        <div class="custom-panel" id="jimengPanel">
            <h2>等待程序开发中</h2>
        </div>
        <div class="custom-panel" id="qianwenPanel">
            <h2>等待程序开发中</h2>
        </div>
        <div class="custom-panel" id="chatglmPanel">
            <h2>等待程序开发中</h2>
        </div>

        <!-- 新增功能对应的空白面板 -->
        <div class="custom-panel" id="prompt-set">
            <h2>等待程序开发中</h2>
        </div>
        <div class="custom-panel" id="course-script">
            <h2>等待程序开发中</h2>
        </div>
        <div class="custom-panel" id="video-script">
            <h2>等待程序开发中</h2>
        </div>
        <div class="custom-panel" id="photo-correct">
            <h2>等待程序开发中</h2>
        </div>
        <div class="custom-panel" id="photo-answer">
            <h2>等待程序开发中</h2>
        </div>
        <div class="custom-panel" id="multi-translate">
            <h2>等待程序开发中</h2>
        </div>
        <div class="custom-panel" id="chinese-analyze">
            <h2>等待程序开发中</h2>
        </div>
        <div class="custom-panel" id="math-exercise">
            <h2>等待程序开发中</h2>
        </div>

            <h2>等待程序开发中</h2>
        </div>
    </main>
</div>

<footer>
    © 2026 青飞的AI小站 | 备案号：xxxxxxxx
</footer>

<script>
    // 全局状态
    let isVoiceEnabled = false;
    let isDarkMode = localStorage.getItem('darkMode') === 'true';

    // 核心配置
    const API_URL = "https://ark.cn-beijing.volces.com/api/v3/chat/completions";
    const API_KEY = "7975c46e-f5b2-445d-b713-27230f456bbb";
    const MODEL_NAME = "ep-20260324183900-ghnz2";

    // DOM元素
    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const homeContent = document.getElementById('homeContent');
    const searchFrame = document.getElementById('searchFrame');
    const navItems = document.querySelectorAll('.nav-item');
    const voiceBtn = document.getElementById('voiceBtn');
    const darkModeBtn = document.getElementById('darkModeBtn');

    // 暗黑模式
    function initDarkMode() {
        if (isDarkMode) {
            document.body.classList.add('dark');
            darkModeBtn.innerHTML = '<span>☀️</span> 亮色模式';
            darkModeBtn.classList.add('active');
        } else {
            document.body.classList.remove('dark');
            darkModeBtn.innerHTML = '<span>🌙</span> 暗黑模式';
            darkModeBtn.classList.remove('active');
        }
    }

    function toggleDarkMode() {
        isDarkMode = !isDarkMode;
        localStorage.setItem('darkMode', isDarkMode);
        initDarkMode();
    }

    // 语音播报
    function speakText(text) {
        if (!isVoiceEnabled) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 1;
        utterance.pitch = 1;
        utterance.volume = 1;
        window.speechSynthesis.speak(utterance);
    }

    function toggleVoice() {
        isVoiceEnabled = !isVoiceEnabled;
        if (isVoiceEnabled) {
            voiceBtn.innerHTML = '<span>🔇</span> 关闭播报';
            voiceBtn.classList.add('active');
            speakText('你好！我是荣恒AI助手，有什么可以帮你的？');
        } else {
            voiceBtn.innerHTML = '<span>🔊</span> 语音播报';
            voiceBtn.classList.remove('active');
            window.speechSynthesis.cancel();
        }
    }

    // 导航逻辑 - 重构以适配新增面板
    function hideAll() {
        // 隐藏所有内容区
        homeContent.style.display = 'none';
        searchFrame.style.display = 'none';
        // 隐藏所有自定义面板
        const allPanels = document.querySelectorAll('.custom-panel');
        allPanels.forEach(panel => panel.style.display = 'none');
    }

    navItems.forEach(item => {
        item.addEventListener('click', (e) => {
            e.preventDefault();
            // 移除所有激活状态
            navItems.forEach(nav => nav.classList.remove('active'));
            // 给当前点击项添加激活状态
            item.classList.add('active');
            
            const type = item.dataset.type;
            const page = item.dataset.page;
            
            hideAll();

            // 首页
            if (type === 'home') {
                homeContent.style.display = 'flex';
            }
            // 原有iframe类AI平台（Kimi/豆包/文心一言）
            else if (type === 'engine') {
                searchFrame.src = item.href;
                searchFrame.style.display = 'block';
            }
            // 自定义面板（原有+新增）
            else if (page) {
                const targetPanel = document.getElementById(page);
                if (targetPanel) {
                    targetPanel.style.display = 'flex';
                }
            }
        });
    });

    // AI对话
    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;

        addMessage('user', message);
        userInput.value = '';

        const loadingContent = addMessage('ai', '<div class="typing">思考中...</div>');

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: MODEL_NAME,
                    messages: [{ role: 'user', content: message }]
                })
            });

            const data = await response.json();
            const reply = data.choices?.[0]?.message?.content || '抱歉，我暂时无法回复';
            loadingContent.innerHTML = reply;
            speakText(reply);
        } catch (error) {
            const errorMsg = `请求失败：${error.message}`;
            loadingContent.innerHTML = errorMsg;
            speakText(errorMsg);
        }
    }

    function addMessage(role, content) {
        const wrapper = document.createElement('div');
        wrapper.className = `message-wrapper ${role === 'user' ? 'user-message-wrapper' : 'ai-message-wrapper'}`;

        const iconDiv = document.createElement('div');
        iconDiv.className = 'message-icon';
        const iconImg = document.createElement('img');
        iconImg.src = role === 'user' ? 'ico/Ren.png' : 'ico/LongXia.png';
        iconImg.alt = role === 'user' ? '用户图标' : 'AI图标';
        iconDiv.appendChild(iconImg);

        const contentDiv = document.createElement('div');
        contentDiv.className = `message-content ${role === 'user' ? 'user-message' : 'ai-message'}`;
        contentDiv.innerHTML = content;

        wrapper.appendChild(iconDiv);
        wrapper.appendChild(contentDiv);
        
        chatArea.appendChild(wrapper);
        chatArea.scrollTop = chatArea.scrollHeight;
        
        return contentDiv;
    }

    // 事件绑定
    clearBtn.addEventListener('click', () => {
        chatArea.innerHTML = `
            <div class="ai-message-wrapper message-wrapper">
                <div class="message-icon">
                    <img src="ico/LongXia.png" alt="AI图标">
                </div>
                <div class="message-content ai-message">你好！我是荣恒AI助手，有什么可以帮你的？</div>
            </div>
        `;
        window.speechSynthesis.cancel();
    });

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    darkModeBtn.addEventListener('click', toggleDarkMode);
    voiceBtn.addEventListener('click', toggleVoice);

    // 初始化
    initDarkMode();
</script>
</body>
</html>
